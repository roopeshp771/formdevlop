<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
    <style>
        .button1{
            background-color:red;
            color:aliceblue;
            margin-left: 20px;
            margin-right: 20px;
            padding-left: 10px;
            padding-right: 10px;
            padding-bottom: 5px;
            padding-top:  7px;

            border:none;
            border-radius:20px;
        }
        .button1:hover{
            opacity: 0.8;
        }
        .button1:active{
            background-color:rgb(236, 46, 87);
        }
        .button2:hover{
            background-color: blue;
            color:aliceblue;
            opacity: 0.4;
            transition: background-color 1s;
            transition: color 1s;
        }
        .button3:hover{
            box-shadow: 3px 2px 1px rgba(0,0,0,0.15);
            transition: box-shadow 0.5s;
        }
        .button2{
            background-color: antiquewhite;
            color:blue;
            border-radius: 4px;
            border-color: blue;
            border-width: 2px;
            margin-left: 20px;
            margin-right: 20px;
            padding-left: 10px;
            padding-right: 10px;
            padding-bottom: 5px;
            padding-top:  7px;
        }
        .button3{
            background-color:yellow;
            border-radius:20px;
            color:black;
            border:none;
            height: 50;
            width: 100px;
            font-size: 10px;
            font-weight: 15px;
        }
        .button4{
            background-color: black;
            color: antiquewhite;
            height: 20px;
            width:40px;
            font-size:7px;     
        }
        .button4:hover{
            transition: background-color 0.5s;
            opacity: 0.4;
            box-shadow:rgba(0,0,0,0.15)
        }
    </style>
</head>
<body>
    <button class="button1">click to this for more</button>
    <button class="button2">join my channel into this</button>
    <button class="button3">Add to cart</button>
    <button class="button4">Register Now</button>
</body>
</html>
